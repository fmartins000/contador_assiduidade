<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Assiduidade</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background: conic-gradient(
        from 45deg,
        #2563eb 0deg 90deg,
        #ef4444 90deg 180deg,
        #22c55e 180deg 270deg,
        #facc15 270deg 360deg
    );
}

.card{
    background:white;
    width:100%;
    max-width:420px;
    padding:30px;
    border-radius:24px;
    box-shadow:0 20px 50px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#1e293b;
    margin-bottom:10px;
}

.subtitulo{
    text-align:center;
    color:#64748b;
    margin-bottom:25px;
    font-size:14px;
}

label{
    display:block;
    margin-bottom:6px;
    margin-top:15px;
    color:#334155;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    border:2px solid #e2e8f0;
    border-radius:12px;
    font-size:16px;
    transition:.2s;
}

input:focus{
    outline:none;
    border-color:#2563eb;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#1d4ed8;
}

.resultado{
    margin-top:25px;
    text-align:center;
    display:none;
}

.pontos{
    font-size:48px;
    font-weight:800;
    color:#2563eb;
}

.texto{
    color:#64748b;
    margin-top:5px;
}

.percentual{
    margin-top:10px;
    font-size:18px;
    color:#0f172a;
    font-weight:600;
}

.info{
    margin-top:20px;
    background:#f8fafc;
    padding:15px;
    border-radius:12px;
    font-size:13px;
    color:#475569;
}
</style>
</head>
<body>

<div class="card">

    <h1>📊 Assiduidade</h1>
    <div class="subtitulo">
        Calculadora proporcional e justa para equipes
    </div>

    <label>Total de membros da equipe</label>
    <input type="number" id="total" placeholder="Ex: 27">

    <label>Presentes na atividade</label>
    <input type="number" id="presentes" placeholder="Ex: 22">

    <label>Pontuação máxima da atividade</label>
    <input type="number" id="maximo" value="100">

    <button onclick="calcular()">
        Calcular Pontuação
    </button>

    <div class="resultado" id="resultado">

        <div class="pontos" id="pontos">
            0
        </div>

        <div class="texto">
            pontos conquistados
        </div>

        <div class="percentual" id="percentual">
            0%
        </div>

    </div>

    <div class="info">
        Fórmula utilizada:<br>
        <strong>(Presentes ÷ Total de membros) × Pontuação Máxima</strong><br><br>
        O cálculo é proporcional ao tamanho da equipe, sem favorecer equipes maiores ou menores.
    </div>

</div>

<script>

function calcular(){

    let total = Number(document.getElementById('total').value);
    let presentes = Number(document.getElementById('presentes').value);
    let maximo = Number(document.getElementById('maximo').value);

    if(total <= 0){
        alert("Informe o total de membros.");
        return;
    }

    if(presentes > total){
        alert("Presentes não pode ser maior que o total de membros.");
        return;
    }

    let percentual = (presentes / total) * 100;
    let pontos = Math.round((presentes / total) * maximo);

    document.getElementById('pontos').innerText = pontos;
    document.getElementById('percentual').innerText =
        percentual.toFixed(1) + "% de presença";

    document.getElementById('resultado').style.display = "block";
}

</script>

</body>
</html>
