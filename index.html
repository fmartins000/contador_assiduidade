<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Assiduidade</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;

    background:
        radial-gradient(circle at 15% 20%, #2563eb 0%, transparent 35%),
        radial-gradient(circle at 85% 20%, #ef4444 0%, transparent 35%),
        radial-gradient(circle at 15% 80%, #22c55e 0%, transparent 35%),
        radial-gradient(circle at 85% 80%, #facc15 0%, transparent 35%),
        #0f172a;
}

.card{
    background:white;
    width:100%;
    max-width:450px;
    padding:30px;
    border-radius:24px;
    box-shadow:0 20px 50px rgba(0,0,0,.3);
}

h1{
    text-align:center;
    color:#1e293b;
    margin-bottom:10px;
}

.subtitulo{
    text-align:center;
    color:#64748b;
    margin-bottom:25px;
    font-size:14px;
}

.equipes{
    text-align:center;
    font-size:22px;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:6px;
    margin-top:15px;
    color:#334155;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    border:2px solid #e2e8f0;
    border-radius:12px;
    font-size:16px;
    transition:.2s;
}

input:focus{
    outline:none;
    border-color:#2563eb;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.resultado{
    margin-top:25px;
    text-align:center;
    display:none;
}

.pontos{
    font-size:52px;
    font-weight:800;
    color:#2563eb;
}

.texto{
    color:#64748b;
    margin-top:5px;
}

.percentual{
    margin-top:15px;
    font-size:17px;
    color:#0f172a;
    line-height:1.8;
}

.info{
    margin-top:20px;
    background:#f8fafc;
    padding:15px;
    border-radius:12px;
    font-size:13px;
    color:#475569;
}

.detalhes{
    margin-top:15px;
    background:#f1f5f9;
    padding:12px;
    border-radius:12px;
    text-align:left;
}
</style>
</head>
<body>

<div class="card">

    <h1>📊 Assiduidade</h1>

    <div class="equipes">
        🔵 🟡 🟢 🔴
    </div>

    <label>Total de membros da equipe</label>
    <input type="number" id="total" placeholder="Ex: 30">

    <label>Presentes na atividade</label>
    <input type="number" id="presentes" placeholder="Ex: 24">

    <label>Visitantes levados pela equipe</label>
    <input type="number" id="visitantes" value="0" min="0">

    <label>Pontuação máxima da atividade</label>
    <input type="number" id="maximo" value="100">

    <button onclick="calcular()">
        Calcular Pontuação
    </button>

    <div class="resultado" id="resultado">

        <div class="pontos" id="pontos">
            0
        </div>

        <div class="texto">
            pontos conquistados
        </div>

        <div class="percentual" id="percentual">
        </div>

        <div class="detalhes" id="detalhes">
        </div>

    </div>

    <div class="info">
        <strong>Regras:</strong><br><br>

        ✔ Assiduidade proporcional ao tamanho da equipe<br>
        ✔ Cada visitante vale +30 pontos<br>
    </div>

</div>

<script>

function calcular(){

    let total = Number(document.getElementById('total').value);
    let presentes = Number(document.getElementById('presentes').value);
    let visitantes = Number(document.getElementById('visitantes').value);
    let maximo = Number(document.getElementById('maximo').value);

    if(total <= 0){
        alert("Informe o total de membros.");
        return;
    }

    if(presentes > total){
        alert("Presentes não pode ser maior que o total de membros.");
        return;
    }

    if(visitantes < 0){
        alert("Quantidade de visitantes inválida.");
        return;
    }

    let percentual = (presentes / total) * 100;

    let pontosAssiduidade = Math.round(
        (presentes / total) * maximo
    );

    let pontosVisitantes = visitantes * 30;

    let pontuacaoFinal =
        pontosAssiduidade + pontosVisitantes;

    document.getElementById('pontos').innerText =
        pontuacaoFinal;

    document.getElementById('percentual').innerHTML =
        percentual.toFixed(1) + "% de presença";

    document.getElementById('detalhes').innerHTML =
        `
        👥 Assiduidade: <strong>${pontosAssiduidade} pts</strong><br>
        🎟️ Visitantes: <strong>${visitantes}</strong><br>
        ⭐ Bônus visitantes: <strong>${pontosVisitantes} pts</strong><br>
        🏆 Total final: <strong>${pontuacaoFinal} pts</strong>
        `;

    document.getElementById('resultado').style.display =
        "block";
}

</script>

</body>
</html>
